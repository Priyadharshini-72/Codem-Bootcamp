<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task4</title>
</head>
<body>
    <h2>duplicate highlighter</h2>
    <ul id="list"></ul>
    <script>
        let items=["apple","banana","apple","banana","orange","mango"];
        function render(){
            let ul=document.getElementById("list");
            ul.innerHTML="";
            for(let i=0;i<items.length;i++){
                let count=0;
                for(let j=0;j<items.length;j++){
                    if(items[i]===items[j]){
                        count++;
                    }
                }
                let li=document.createElement("li");
                li.textContent=items[i];
                if(count>1){
                    li.style.background="yellow";
                }
                ul.appendChild(li);
            }
        }
        render()
    </script>
</body>
</html>
