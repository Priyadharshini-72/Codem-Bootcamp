<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task9</title>
</head>
<body>
    <div id="invent"></div>
    <script>
        let inventory=[{product:"pen",quantity:10},{product:"notebook",quantity:5},{product:"eraser",quantity:0}];
        function render(){
            let div=document.getElementById("invent");
            div.innerHTML="";
            for(let i=0;i<inventory.length;i++){
                div.innerHTML+=`${inventory[i].product}-${inventory[i].quantity}<br><button onclick="increase(${i})">Increase</button>
                    <button onclick="decrease(${i})">decrease</button><br>`;
        }}
        function increase(i){
            inventory[i].quantity++;
            render();
        }
        function decrease(i){
            if(inventory[i].quantity>0){
                inventory[i].quantity--;
            }
            render();
        }
        render();
    </script>
</body>
</html>
