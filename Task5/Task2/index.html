<body>
    <h2>The Length and Square of Number</h2>
    <script>
        let StringFunction=function(str){
            return str.length;
        }
        let SquareFunction=(number)=>{
            return number*number;

        }
        let LengthResult=StringFunction("priya");
        let SquareResult=SquareFunction(5);
        console.log("The Length of the String:",LengthResult);
        console.log("The Square of the Number:",SquareResult);
</script>

</body>
