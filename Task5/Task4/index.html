<body>
    <h1>Function With Default Parameters</h1>
    <script>
        function CalculateDiscount(price,discount=20){
            let FinalPrice=price-(discount*price/100);
            return FinalPrice;
        }
        let FinalPriceAmount=CalculateDiscount(1000)
        console.log("The FinalPrice with passing the Discount value:",CalculateDiscount(300,20));
        console.log("The FinalAmount without passing the Discount Value:",FinalPriceAmount);
    </script>
</body>
