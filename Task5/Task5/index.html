<body>
    <h1>Immediately Invoked Function Expression</h1>
    <script>
        (function(){
            let Number1=2;
            let Number2=6;
            let Sum=Number1+Number2;
            console.log("The Sum of Two Numbers is:",Sum);
        })();
    </script>
</body>
