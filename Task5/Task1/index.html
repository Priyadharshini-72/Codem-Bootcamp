<body>
    <h1>Sum and product of Two Parameteres</h1>
    <script>
        function CalculateSum(parameter1,parameter2){
              let Sum=parameter1+parameter2;
              return Sum;
        }
        function CalculateProduct(parameter1,parameter2){
            let Product=parameter1*parameter2;
            return Product;
        }
        let SumResult=CalculateSum(5,4);
        let ProductResult=CalculateProduct(6,5);
        console.log("The Sum of Two Parameters is:",SumResult);
        console.log("The Product of Two parameters is:",ProductResult);
    </script>
</body>
